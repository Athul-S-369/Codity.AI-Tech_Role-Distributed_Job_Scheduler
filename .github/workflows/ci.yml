# CI — Athul S (RA2311047010117)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scheduler
          POSTGRES_PASSWORD: scheduler_secret
          POSTGRES_DB: codity_scheduler
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scheduler -d codity_scheduler"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://scheduler:scheduler_secret@localhost:5432/codity_scheduler?schema=public
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret
      WORKER_REGISTRATION_KEY: ci-worker-key
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build -w shared

      - run: npm run db:push -w backend

      - run: npm test

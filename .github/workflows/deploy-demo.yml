# Deploy visual demo (static mock UI) to GitHub Pages — Athul S (RA2311047010117)
name: Deploy visual demo

on:
  push:
    branches: [main, master]
    paths:
      - 'frontend/**'
      - 'shared/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    env:
      PAGES_BASE: /${{ github.event.repository.name }}/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build visual demo
        run: npm run build:demo

      - name: SPA fallback for client-side routes
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
